# ArgoCD Application: 이 저장소의 apps/demo 경로를 감시해서 demo 네임스페이스에 배포
# 적용: kubectl apply -f argocd/demo-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sanacor/kubernetes-cluster-macbookair-local.git
    targetRevision: main
    path: apps/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true      # git에서 삭제된 리소스는 클러스터에서도 삭제
      selfHeal: true   # 클러스터를 수동으로 건드리면 git 상태로 되돌림
    syncOptions:
      - CreateNamespace=true
