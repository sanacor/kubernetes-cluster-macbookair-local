# ArgoCD Application: 이 저장소의 apps/demo 경로를 감시해서 demo 네임스페이스에 배포
# 적용: kubectl apply -f argocd/demo-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sanacor/kubernetes-cluster-macbookair-local.git
    targetRevision: main
    path: apps/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    # 자동 sync 비활성화 — git 변경 후 UI의 SYNC 버튼(또는 argocd app sync demo)으로 수동 반영
    syncOptions:
      - CreateNamespace=true
