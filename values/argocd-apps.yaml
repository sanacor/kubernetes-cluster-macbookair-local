# ArgoCD Application 정의 (argocd-apps 차트)
# 여기에 앱을 추가/수정하고 `helmfile apply`로 반영
applications:
  demo:
    namespace: argocd
    project: default
    source:
      repoURL: https://github.com/sanacor/kubernetes-cluster-macbookair-local.git
      targetRevision: main
      path: apps/demo
    destination:
      server: https://kubernetes.default.svc
      namespace: demo
    # 자동 sync 비활성화 — git 변경 후 UI의 SYNC 버튼(또는 argocd app sync demo)으로 수동 반영
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
