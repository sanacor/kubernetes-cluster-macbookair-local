# ArgoCD 본체 (부트스트랩용 — 이후 설정 변경은 ArgoCD self-management로:
# values/argocd.yaml 수정 → push → UI에서 SYNC)
repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

releases:
  - name: argocd
    namespace: argocd
    createNamespace: true
    chart: argo/argo-cd
    version: 10.1.4   # values/argocd-apps.yaml의 targetRevision과 맞출 것
    values:
      - ../values/argocd.yaml
