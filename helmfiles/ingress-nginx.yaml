# 인프라: ingress-nginx (kind 호스트 80/443 포트 매핑과 연결)
repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

releases:
  - name: ingress-nginx
    namespace: ingress-nginx
    createNamespace: true
    chart: ingress-nginx/ingress-nginx
    version: 4.15.1
    values:
      - ../values/ingress-nginx.yaml
    # 이후 단계(argocd의 Ingress 생성)가 admission webhook을 필요로 하므로 대기
    wait: true
