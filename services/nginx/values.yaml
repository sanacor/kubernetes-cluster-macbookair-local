# kind 클러스터용 ingress-nginx 설정
# kind-config.yaml의 extraPortMappings(80/443)와 연결되도록 hostPort 사용
controller:
  hostPort:
    enabled: true
  service:
    type: NodePort
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  # 로컬 단일 노드라 리소스 절약
  resources:
    requests:
      cpu: 70m
      memory: 90Mi
