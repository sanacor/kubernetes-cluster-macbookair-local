# 로컬 kind 클러스터(argocd-lab)용 helmfile
# 사용법:
#   helmfile diff   # 적용 전 변경사항 미리보기
#   helmfile apply  # 설치/업그레이드
repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

releases:
  - name: ingress-nginx
    namespace: ingress-nginx
    createNamespace: true
    chart: ingress-nginx/ingress-nginx
    version: 4.15.1
    values:
      - values/ingress-nginx.yaml
    wait: true

  - name: argocd
    namespace: argocd
    createNamespace: true
    chart: argo/argo-cd
    version: 10.1.4
    values:
      - values/argocd.yaml
    needs:
      - ingress-nginx/ingress-nginx
